{{- if .Values.tutorial.enabled }}
---
# ConfigMap — embed server.js, index.html, package.json from files/tutorial/
apiVersion: v1
kind: ConfigMap
metadata:
  name: planectl-tutorial
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
data:
  package.json: |
{{ .Files.Get "files/tutorial/package.json" | indent 4 }}
  server.js: |
{{ .Files.Get "files/tutorial/server.js" | indent 4 }}
  index.html: |
{{ .Files.Get "files/tutorial/index.html" | indent 4 }}
---
# Deployment — initContainer installs npm deps, main container runs the app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planectl-tutorial
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
    app.kubernetes.io/component: tutorial
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: planectl-tutorial
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: planectl-tutorial
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: npm-install
          image: node:20
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp /config/package.json /app/
              cp /config/server.js    /app/
              cp /config/index.html   /app/
              cd /app && npm install 2>&1
          volumeMounts:
            - name: config
              mountPath: /config
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      containers:
        - name: tutorial
          image: node:20
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: {{ .Values.tutorial.port | quote }}
            - name: CONTROL_PLANE_HOST
              value: {{ .Values.host | quote }}
            - name: GITEA_PORT
              value: "30080"
            - name: ARGOCD_PORT
              value: "8080"
            - name: DEMO_REPO
              value: "admin/demo-repo"
          ports:
            - name: http
              containerPort: {{ .Values.tutorial.port }}
              protocol: TCP
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.tutorial.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: planectl-tutorial
        - name: app
          emptyDir: {}
---
# Service — LoadBalancer so docker-desktop exposes it directly on localhost:4000
apiVersion: v1
kind: Service
metadata:
  name: planectl-tutorial
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
    app.kubernetes.io/component: tutorial
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: planectl-tutorial
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.tutorial.port }}
      targetPort: {{ .Values.tutorial.port }}
      protocol: TCP
{{- end }}
