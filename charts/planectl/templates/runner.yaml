{{- if .Values.runner.enabled }}
# Gitea Actions runner: runs workflow jobs in Docker containers on the host.
# The runner-token Secret is created by the planectl-wiring Job (hook-weight "10").
# On first install the pod will restart until the wiring job creates the secret --
# this is expected and Kubernetes will back off gracefully.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "planectl.labels" . | nindent 4 }}
    app: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
        app.kubernetes.io/name: gitea-runner
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: runner
          image: {{ .Values.runner.image }}:{{ .Values.runner.imageTag }}
          imagePullPolicy: IfNotPresent
          env:
            # Runners run Docker containers on the host; they talk to Gitea via
            # the external NodePort URL, not the in-cluster service.
            - name: GITEA_INSTANCE_URL
              value: {{ include "planectl.giteaExtURL" . | quote }}
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-token
                  key: token
                  # optional: true allows the pod to start before the init job
                  # creates the secret -- it will restart until registered.
                  optional: true
            - name: GITEA_RUNNER_NAME
              value: "planectl-runner"
            - name: GITEA_RUNNER_LABELS
              value: "ubuntu-latest:docker://node:20-bullseye,ubuntu-22.04:docker://node:20-bullseye,self-hosted:docker://node:20-bullseye"
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: runner-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: docker-sock
          hostPath:
            path: {{ .Values.runner.dockerSocket }}
        - name: runner-data
          persistentVolumeClaim:
            claimName: gitea-runner-data
{{- end }}
