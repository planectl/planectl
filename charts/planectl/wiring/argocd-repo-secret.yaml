# ArgoCD learns where Gitea lives.
# Applied by the planectl-wiring Job; $VARS are substituted at runtime.
#
# Teach ArgoCD about a new repo:
#   copy this file, change url/username/password, kubectl apply -f it.
apiVersion: v1
kind: Secret
metadata:
  name: gitea-demo-repo
  namespace: $ARGOCD_NS
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: $REPO_URL
  username: $GITEA_USER
  password: $ARGOCD_TOKEN
