# Pulumi Stack CR — tells the Pulumi Kubernetes Operator which Program to run.
# Applied directly by the wiring Job (not via ArgoCD).
#
# To run a different Pulumi program:
#   change programRef.name to point at another Program CR.
apiVersion: pulumi.com/v1
kind: Stack
metadata:
  name: demo-stack
  namespace: $PULUMI_NS
spec:
  # Stack name -- used as a key for state
  stack: dev

  # Reference to the Program CR -- no git, no HTTP, no credentials needed
  programRef:
    name: demo-program

  # State stored locally in the operator pod -- no S3, no Pulumi Cloud needed for demo
  backend: "file:///tmp"

  # Empty passphrase for demo -- required by the local file backend secrets manager
  envRefs:
    PULUMI_CONFIG_PASSPHRASE:
      type: Literal
      literal:
        value: ""

  # Use the slim base image — yaml runtime needs only the Pulumi CLI binary,
  # not the full ~3.4 GB pulumi/pulumi image with all language SDKs.
  workspaceTemplate:
    spec:
      image: "pulumi/pulumi-base:latest"
      imagePullPolicy: IfNotPresent
      env:
        - name: PULUMI_HOME
          value: "/tmp/pulumi"
        - name: USER
          value: "pulumi"

  destroyOnFinalize: true
  refresh: true
  continueResyncOnCommitMatch: true
