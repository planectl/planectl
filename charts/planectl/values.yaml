# planectl — default values
# Override with --set key=value or -f custom-values.yaml

# ── Host ────────────────────────────────────────────────────────────────────────
# Public hostname or IP where Gitea NodePort is reachable from inside Docker containers
# (used to build GITEA_INSTANCE_URL for the Actions runner).
# Use "host.docker.internal" for Docker Desktop, or the VM's external IP for remote clusters.
host: host.docker.internal

# ── Init Job ────────────────────────────────────────────────────────────────────
# The post-install hook that wires everything together.
init:
  enabled: true
  # base64-encoded kubeconfig for Gitea Actions runner to call kubectl from Docker containers.
  # Required for crossplane-deploy workflow. Generate with:
  #   kubectl config view --minify --flatten \
  #     | sed 's|https://127.0.0.1:|https://host.docker.internal:|g' \
  #     | base64 -w0
  kubeconfigB64: ""

# ── AWS (optional) ──────────────────────────────────────────────────────────────
# Set enabled: true and provide credentials to install Crossplane AWS providers.
aws:
  enabled: false
  accessKeyId: ""
  secretAccessKey: ""
  region: eu-west-1

# ── Gitea Actions Runner ─────────────────────────────────────────────────────────
runner:
  enabled: true
  dockerSocket: /var/run/docker.sock

# ── Gitea subchart ───────────────────────────────────────────────────────────────
# Passes values directly to the gitea/gitea chart.
# Ref: https://gitea.com/gitea/helm-chart
gitea:
  enabled: true
  gitea:
    admin:
      username: admin
      password: admin123
      email: admin@example.com
    config:
      actions:
        ENABLED: "true"
        DEFAULT_ACTIONS_URL: github
      server:
        ROOT_URL: http://localhost:30080
  service:
    http:
      type: NodePort
      nodePort: 30080
  persistence:
    size: 5Gi
  metrics:
    enabled: false
  postgresql-ha:
    enabled: false
  postgresql:
    enabled: true
    primary:
      persistence:
        size: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
  valkey-cluster:
    enabled: false
  valkey:
    enabled: true
    primary:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── ArgoCD subchart ──────────────────────────────────────────────────────────────
# Ref: https://artifacthub.io/packages/helm/argo/argo-cd
argo-cd:
  enabled: true
  configs:
    params:
      server.insecure: true
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false
  server:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  repoServer:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  controller:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  redis:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# ── Crossplane subchart ───────────────────────────────────────────────────────────
# Ref: https://artifacthub.io/packages/helm/crossplane/crossplane
crossplane:
  enabled: true
  resourcesCrossplane:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  resourcesRBACManager:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ── Tutorial ─────────────────────────────────────────────────────────────────────
# Interactive GitOps workshop UI with embedded terminal (node-pty + xterm.js)
# Accessible at http://localhost:4000 on docker-desktop (LoadBalancer)
tutorial:
  enabled: true
  port: 4000

# ── Pulumi Kubernetes Operator subchart ───────────────────────────────────────────
# Ref: https://github.com/pulumi/pulumi-kubernetes-operator
pulumi-kubernetes-operator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi
