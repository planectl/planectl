# planectl — default values
# Override with --set key=value or -f custom-values.yaml

# ── Host ────────────────────────────────────────────────────────────────────────
# Hostname used for browser-facing URLs (NOTES output, terminal links).
# localhost works on Docker Desktop (NodePort + LoadBalancer both bind to localhost).
# On AWS/remote: set to the server's public IP or hostname.
host: localhost

# ── Init Job ────────────────────────────────────────────────────────────────────
# The post-install hook that sets up Gitea and writes the wiring-tokens Secret.
# Before helm install, create the kubeconfig Secret manually:
#   kubectl create namespace gitops
#   kubectl create secret generic planectl-kubeconfig \
#     --namespace gitops \
#     --from-literal=kubeconfig="$(
#       kubectl config view --minify --flatten \
#         | sed 's|127.0.0.1|kubernetes.docker.internal|g'
#     )"
init:
  enabled: true

# ── AWS (optional) ──────────────────────────────────────────────────────────────
# Set enabled: true and provide credentials to install Crossplane AWS providers.
aws:
  enabled: false
  accessKeyId: ""
  secretAccessKey: ""
  region: eu-west-1

# ── Gitea Actions Runner ─────────────────────────────────────────────────────────
runner:
  enabled: true
  image: gitea/act_runner
  imageTag: "0.2.11"
  dockerSocket: /var/run/docker.sock
  # URL the runner uses to reach Gitea from *inside* Docker containers on the host.
  # Docker containers cannot use "localhost" — they need the host's bridge address.
  # Docker Desktop: host.docker.internal  |  AWS EC2/k3s: set to the EC2 private IP
  giteaHost: host.docker.internal

# ── Gitea subchart ───────────────────────────────────────────────────────────────
# Passes values directly to the gitea/gitea chart.
# Ref: https://gitea.com/gitea/helm-chart
gitea:
  enabled: true
  gitea:
    admin:
      username: admin
      password: admin123
      email: admin@example.com
    config:
      actions:
        ENABLED: "true"
        DEFAULT_ACTIONS_URL: github
      server:
        ROOT_URL: http://localhost:30080
  service:
    http:
      type: NodePort
      nodePort: 30080
  persistence:
    size: 5Gi
  metrics:
    enabled: false
  postgresql-ha:
    enabled: false
  postgresql:
    enabled: true
    primary:
      persistence:
        size: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
  valkey-cluster:
    enabled: false
  valkey:
    enabled: true
    primary:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── ArgoCD subchart ──────────────────────────────────────────────────────────────
# Ref: https://artifacthub.io/packages/helm/argo/argo-cd
argo-cd:
  enabled: true
  configs:
    params:
      server.insecure: true
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false
  server:
    service:
      type: LoadBalancer
      servicePortHttp: 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  repoServer:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  controller:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  redis:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# ── Crossplane subchart ───────────────────────────────────────────────────────────
# Ref: https://artifacthub.io/packages/helm/crossplane/crossplane
crossplane:
  enabled: true
  resourcesCrossplane:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  resourcesRBACManager:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ── Terminal ──────────────────────────────────────────────────────────────────
# xterm.js browser terminal — kubectl, helm, and gitea-cli pre-configured.
# Useful cockpit for local demos. For remote/shared clusters, disable this
# or place it behind an authenticating proxy (oauth2-proxy + Okta/GitHub/etc).
#
# To disable:  --set terminal.enabled=false
# To secure:   add an oauth2-proxy sidecar and set terminal.authProxy.enabled=true
#              (see wiring examples in the README)
terminal:
  enabled: true
  port: 4000

# ── Pulumi Kubernetes Operator subchart ───────────────────────────────────────────
# Ref: https://github.com/pulumi/pulumi-kubernetes-operator
pulumi-kubernetes-operator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ── KEDA (optional) ───────────────────────────────────────────────────────────
# Kubernetes Event-Driven Autoscaler — scales runners and workloads on
# queue depth, Prometheus metrics, or any KEDA trigger source.
# Enable to unlock the ScaledObject wiring examples.
keda:
  enabled: false
  resources:
    operator:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
    metricServer:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
