<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>planectl — Interactive Workshop</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #0f1628;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --green: #00ff88;
    --red: #ff3b5c;
    --text: #e2e8f0;
    --muted: #8892a4;
    --card: #111827;
    --sidebar-w: 260px;
    --header-h: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    width: 100vw;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-sep { width: 1px; height: 24px; background: var(--border); }

  .header-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .header-subtitle { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .live-link {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 5px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    text-decoration: none; border: 1px solid var(--border);
    background: rgba(15,22,40,0.95); color: var(--muted);
    transition: all 0.2s; letter-spacing: 1px; cursor: pointer;
  }
  .live-link:hover { color: var(--text); }
  .live-link.gitea:hover { border-color: var(--accent2); color: var(--accent2); }
  .live-link.argo:hover  { border-color: #f97316; color: #f97316; }

  .live-dot { width: 6px; height: 6px; border-radius: 50%; animation: live-blink 2s infinite; }
  .live-link.gitea .live-dot { background: var(--accent2); }
  .live-link.argo  .live-dot { background: #f97316; }

  @keyframes live-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .workspace {
    display: flex;
    height: calc(100vh - var(--header-h));
    flex-shrink: 0;
    overflow: hidden;
  }

  .step-sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }

  .step-sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  }

  .step-list { overflow-y: auto; flex: 1; }
  .step-list::-webkit-scrollbar { width: 4px; }
  .step-list::-webkit-scrollbar-track { background: transparent; }
  .step-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .step-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 16px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid rgba(30,45,74,0.4);
  }
  .step-item:hover { background: rgba(0,212,255,0.04); }
  .step-item.active { background: rgba(0,212,255,0.06); border-left-color: var(--accent); }
  .step-item.completed { opacity: 0.6; }
  .step-item.completed .step-num { background: var(--green); color: #000; border-color: var(--green); }

  .step-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 10px;
    flex-shrink: 0; margin-top: 1px; transition: all 0.2s;
  }
  .step-item.active .step-num { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  .step-info { flex: 1; min-width: 0; }
  .step-label { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
  .step-item.active .step-label { color: var(--accent); }
  .step-desc { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .progress-bar { height: 2px; background: var(--border); flex-shrink: 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 8px var(--accent); }

  .content-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  .content-header { padding: 16px 24px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .step-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .content-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
  .content-subtitle { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 4px; }

  .content-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .content-body::-webkit-scrollbar { width: 4px; }
  .content-body::-webkit-scrollbar-track { background: transparent; }
  .content-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .content-nav {
    padding: 12px 24px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }

  .nav-btn {
    background: none; border: 1px solid var(--border); color: var(--text);
    padding: 7px 18px; border-radius: 5px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 11px;
    transition: all 0.2s; letter-spacing: 1px;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { border-color: var(--border); color: var(--text); }
  .nav-btn.primary { background: rgba(0,212,255,0.08); border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary:hover { background: rgba(0,212,255,0.18); }

  .nav-counter { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .terminal-panel {
    height: 480px; display: flex; flex-direction: column;
    background: #0d1117; border-top: 2px solid var(--accent); flex-shrink: 0;
  }

  .terminal-anchor-hint {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 4px;
    background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.2);
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent);
    text-decoration: none; letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
  }
  .terminal-anchor-hint:hover { background: rgba(0,212,255,0.14); border-color: var(--accent); }

  .terminal-bar {
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .traffic-lights { display: flex; gap: 5px; }
  .tl { width: 11px; height: 11px; border-radius: 50%; }
  .tl-red { background: #ff5f57; } .tl-yellow { background: #febc2e; } .tl-green { background: #28c840; }
  .terminal-bar .t-title { flex: 1; text-align: center; font-size: 11px; color: #8b949e; font-family: 'Space Mono', monospace; }
  .t-toolbar { display: flex; gap: 6px; margin-left: auto; }
  .t-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: 'Space Mono', monospace; transition: background 0.15s; }
  .t-btn:hover { background: #30363d; }
  #terminal-container { flex: 1; padding: 6px; min-height: 0; overflow: hidden; }
  #terminal-container .xterm { height: 100%; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.012) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .workspace { position: relative; z-index: 1; }

  /* ── Content components ── */
  p.body-text { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }
  p.body-text strong { color: var(--text); }
  p.body-text em { color: var(--accent3); font-style: normal; }

  .section-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 16px 0 8px;
  }

  .cmd-block {
    display: flex; align-items: center; gap: 10px;
    background: #050810; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; margin: 8px 0;
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent3);
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .cmd-block:hover { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .cmd-block .cmd-arrow { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .cmd-block .cmd-text { flex: 1; }
  .cmd-block .cmd-hint { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .code-block {
    background: #050810; border: 1px solid var(--border); border-radius: 7px;
    padding: 14px; font-family: 'Space Mono', monospace; font-size: 10px; line-height: 1.9;
    position: relative; overflow: hidden;
  }
  .code-block::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
  .code-block.infra::before  { background: #f97316; }
  .code-block.pulumi::before { background: var(--accent3); }
  .code-block.git::before    { background: var(--accent2); }

  .cy{color:#7dd3fc} .cg{color:var(--green)} .co{color:var(--accent2)}
  .cm{color:var(--muted)} .cw{color:var(--text)} .cp{color:var(--accent3)} .cr{color:var(--red)}

  .t-block {
    background: #050810; border: 1px solid var(--border); border-radius: 5px;
    padding: 12px; font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1.8; margin-top: 12px;
  }
  .t-prompt { color: var(--muted); } .t-cmd { color: var(--accent3); } .t-good { color: var(--green); } .t-bad { color: var(--red); }

  .layer-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
  .layer-table th { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .layer-table td { padding: 12px; border-bottom: 1px solid rgba(30,45,74,0.5); vertical-align: middle; }
  .layer-table tr:last-child td { border-bottom: none; }
  .layer-table tr:hover td { background: rgba(124,58,237,0.03); }

  .layer-badge { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; font-size: 12px; }
  .layer-dot { width: 7px; height: 7px; border-radius: 50%; }

  .boundary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 12px 0; }
  .boundary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; position: relative; overflow: hidden; }
  .boundary-card.infra  { border-color: rgba(249,115,22,0.35); }
  .boundary-card.infra::before  { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #f97316; }
  .boundary-card.pulumi { border-color: rgba(124,58,237,0.35); }
  .boundary-card.pulumi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent3); }
  .bc-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .bc-label.infra  { color: #f97316; }
  .bc-label.pulumi { color: var(--accent3); }
  .bc-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .bc-body  { font-size: 11px; color: var(--muted); line-height: 1.7; }

  .bottom-line {
    margin-top: 16px; padding: 14px 20px;
    background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px; font-size: 12px; text-align: center;
    color: var(--accent); font-weight: 700; line-height: 1.6;
  }

  .open-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 6px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    text-decoration: none; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; border: 1px solid;
    margin-top: 8px; margin-right: 8px;
  }
  .open-btn.gitea-btn { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.4); color: var(--accent2); }
  .open-btn.gitea-btn:hover { background: rgba(255,107,53,0.15); border-color: var(--accent2); }
  .open-btn.argo-btn  { background: rgba(249,115,22,0.08); border-color: rgba(249,115,22,0.4); color: #f97316; }
  .open-btn.argo-btn:hover  { background: rgba(249,115,22,0.15); border-color: #f97316; }

  /* Pipeline */
  .pipeline { display: flex; align-items: center; justify-content: center; gap: 0; margin: 16px 0; overflow-x: auto; }
  .p-node { display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; transform: scale(0.8); transition: opacity 0.4s ease, transform 0.4s ease; }
  .p-node.visible { opacity: 1; transform: scale(1); }
  .p-icon { width: 60px; height: 60px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid var(--border); position: relative; background: var(--card); }
  .p-icon.git-node     { color: var(--accent2); border-color: var(--accent2); }
  .p-icon.argo-node    { color: #f97316;        border-color: #f97316; }
  .p-icon.xp-node      { color: var(--green);   border-color: var(--green); }
  .p-icon.pulumi-node  { color: var(--accent3);  border-color: var(--accent3); }
  .p-label    { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; }
  .p-sublabel { font-size: 10px; color: var(--muted); text-align: center; max-width: 80px; line-height: 1.3; margin-top: -4px; }
  .p-arrow { display: flex; flex-direction: column; align-items: center; width: 50px; opacity: 0; transition: opacity 0.4s; }
  .p-arrow.visible { opacity: 1; }
  .arrow-line { width: 100%; height: 2px; background: var(--border); position: relative; overflow: hidden; }
  .arrow-pulse { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, var(--accent3), transparent); animation: pulse-flow 1.5s infinite; }
  .p-arrow.active-arrow .arrow-line { background: var(--accent3); }
  .arrow-head { width: 0; height: 0; border-left: 7px solid var(--border); border-top: 4px solid transparent; border-bottom: 4px solid transparent; margin-left: auto; margin-top: -2px; }
  .p-arrow.active-arrow .arrow-head { border-left-color: var(--accent3); }
  .arrow-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 4px; text-align: center; }
  .status-badge { position: absolute; top: -8px; right: -8px; font-size: 8px; padding: 2px 6px; border-radius: 8px; font-family: 'Space Mono', monospace; font-weight: 700; opacity: 0; transition: opacity 0.3s; }
  .status-badge.show   { opacity: 1; }
  .status-badge.synced { background: rgba(0,255,136,0.2); color: var(--green);   border: 1px solid var(--green); }
  .status-badge.ready  { background: rgba(124,58,237,0.2); color: var(--accent3); border: 1px solid var(--accent3); }
  @keyframes pulse-flow { 0%{left:-60%} 100%{left:120%} }

  .run-demo-btn {
    background: none; border: 1px solid var(--accent); color: var(--accent);
    padding: 7px 20px; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 11px;
    cursor: pointer; letter-spacing: 2px; display: block; margin: 0 auto 16px; transition: background 0.2s;
  }
  .run-demo-btn:hover { background: rgba(0,212,255,0.08); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="header-logo">planectl</div>
  <div class="header-sep"></div>
  <div>
    <div class="header-title">Architecture as an Enforced API</div>
    <div class="header-subtitle">// interactive tutorial</div>
  </div>
  <div class="header-right">
    <a class="live-link gitea" href="#" data-config="gitea-actions" target="_blank">
      <span class="live-dot"></span>Gitea Actions
    </a>
    <a class="live-link argo" href="#" data-config="argo-apps" target="_blank">
      <span class="live-dot"></span>ArgoCD
    </a>
    <a class="terminal-anchor-hint" onclick="document.getElementById('terminal-section').scrollIntoView({behavior:'smooth'})">
      ↓ terminal
    </a>
  </div>
</header>

<div class="workspace">
  <aside class="step-sidebar">
    <div class="step-sidebar-header">Steps</div>
    <div class="step-list" id="step-list"></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </aside>

  <div class="content-panel">
    <div class="content-header">
      <div class="step-tag" id="step-tag">Step 1 of 7</div>
      <div class="content-title" id="content-title"></div>
      <div class="content-subtitle" id="content-subtitle"></div>
    </div>
    <div class="content-body" id="content-body"></div>
    <div class="content-nav">
      <button class="nav-btn" id="btn-prev" onclick="prevStep()">← prev</button>
      <span class="nav-counter" id="nav-counter">1 / 7</span>
      <button class="nav-btn primary" id="btn-next" onclick="nextStep()">next →</button>
    </div>
  </div>
</div>

<div class="terminal-panel" id="terminal-section">
  <div class="terminal-bar">
    <div class="traffic-lights">
      <span class="tl tl-red"></span><span class="tl tl-yellow"></span><span class="tl tl-green"></span>
    </div>
    <span class="t-title">
      live shell
      <span id="status-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#d29922;margin:0 4px;vertical-align:middle;"></span>
      <span id="status-label" style="font-size:10px;color:#8b949e;">connecting…</span>
    </span>
    <div class="t-toolbar">
      <button class="t-btn" onclick="term.clear()">Clear</button>
    </div>
  </div>
  <div id="terminal-container"></div>
</div>

<script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
<script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
<script src="node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
<script src="node_modules/@xterm/addon-attach/lib/addon-attach.js"></script>

<script>
// ── STEPS ─────────────────────────────────────────────────────────────────────
const steps = [
  {
    label: 'The Four Layers',
    desc: 'One question each. No overlap.',
    title: 'One management cluster. Four distinct jobs.',
    subtitle: '// each layer owns one question — no layer answers two',
    body: () => `
      <p class="body-text">
        planectl is not a tool — it is an <em>architecture</em>.
        Four layers, each with a distinct question to answer.
        Remove any one and the system breaks down.
      </p>
      <table class="layer-table">
        <thead><tr><th>#</th><th>Layer</th><th>Tool</th><th>Question it answers</th></tr></thead>
        <tbody>
          <tr>
            <td style="color:var(--muted);font-family:'Space Mono',monospace;">1</td>
            <td><span class="layer-badge"><span class="layer-dot" style="background:var(--accent2)"></span>Source of Truth</span></td>
            <td style="font-family:'Space Mono',monospace;font-size:11px;">Gitea</td>
            <td style="color:var(--muted);">What should everything be?</td>
          </tr>
          <tr>
            <td style="color:var(--muted);font-family:'Space Mono',monospace;">2</td>
            <td><span class="layer-badge"><span class="layer-dot" style="background:#f97316"></span>Intent Delivery</span></td>
            <td style="font-family:'Space Mono',monospace;font-size:11px;">ArgoCD</td>
            <td style="color:var(--muted);">Is the right thing running in the right cluster?</td>
          </tr>
          <tr>
            <td style="color:var(--muted);font-family:'Space Mono',monospace;">3</td>
            <td><span class="layer-badge"><span class="layer-dot" style="background:var(--green)"></span>Infra Control</span></td>
            <td style="font-family:'Space Mono',monospace;font-size:11px;">Crossplane</td>
            <td style="color:var(--muted);">Does the resource exist, in the right shape?</td>
          </tr>
          <tr>
            <td style="color:var(--muted);font-family:'Space Mono',monospace;">4</td>
            <td><span class="layer-badge"><span class="layer-dot" style="background:var(--accent3)"></span>Functional Control</span></td>
            <td style="font-family:'Space Mono',monospace;font-size:11px;">Pulumi</td>
            <td style="color:var(--muted);">Given it exists — what should it do, right now?</td>
          </tr>
        </tbody>
      </table>
      <div class="pipeline" id="pipeline">
        <div class="p-node" id="pn-git">
          <div class="p-icon git-node">⑃<span class="status-badge synced" id="badge-git">TRUTH</span></div>
          <div class="p-label">Gitea</div><div class="p-sublabel">source of truth</div>
        </div>
        <div class="p-arrow" id="pa-1"><div class="arrow-line"><div class="arrow-pulse"></div></div><div class="arrow-head"></div><div class="arrow-label">auto-sync</div></div>
        <div class="p-node" id="pn-argo">
          <div class="p-icon argo-node">◎<span class="status-badge synced" id="badge-argo">SYNCED</span></div>
          <div class="p-label">ArgoCD</div><div class="p-sublabel">Git → cluster</div>
        </div>
        <div class="p-arrow" id="pa-2"><div class="arrow-line"><div class="arrow-pulse"></div></div><div class="arrow-head"></div><div class="arrow-label">kubectl apply</div></div>
        <div class="p-node" id="pn-xp">
          <div class="p-icon xp-node">✕<span class="status-badge synced" id="badge-xp">READY</span></div>
          <div class="p-label">Crossplane</div><div class="p-sublabel">infra skeleton</div>
        </div>
        <div class="p-arrow" id="pa-3"><div class="arrow-line"><div class="arrow-pulse"></div></div><div class="arrow-head"></div><div class="arrow-label">rules run</div></div>
        <div class="p-node" id="pn-pulumi">
          <div class="p-icon pulumi-node">λ<span class="status-badge ready" id="badge-pulumi">TUNED</span></div>
          <div class="p-label">Pulumi</div><div class="p-sublabel">functional layer</div>
        </div>
      </div>
      <div id="pipeline-message" style="text-align:center;margin:8px 0;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);min-height:18px;"></div>
      <button class="run-demo-btn" onclick="runPipelineAnimation()">▶ RUN DEMO</button>
      <div class="section-label">Verify the stack is running</div>
      ${cmd('kubectl get pods -n gitea',             'Layer 1+runner: Gitea and Actions runner')}
      ${cmd('kubectl get pods -n argocd',            'Layer 2: ArgoCD pods')}
      ${cmd('kubectl get pods -n crossplane-system', 'Layer 3: Crossplane pods')}
    `
  },
  {
    label: 'Infra Layer',
    desc: 'ArgoCD syncs namespaces from Git',
    title: 'The infra layer creates the skeleton.',
    subtitle: '// namespaces in Git → ArgoCD applies them → they exist in the cluster',
    body: () => `
      <p class="body-text">
        In <code style="color:var(--accent2);font-size:11px;">infra/teams/</code> in Git there are two YAML files.
        ArgoCD watches that folder and <code style="color:#f97316;font-size:11px;">kubectl apply</code>s them automatically.
        In production these would be <em>Crossplane Composite Resources</em> — the same pattern,
        but the output would be an EKS namespace, a VPC, or a node pool.
      </p>
      <div class="code-block infra" style="margin:12px 0;">
<span class="cy">apiVersion</span><span class="cw">: v1</span>
<span class="cy">kind</span><span class="cw">: Namespace</span>
<span class="cy">metadata</span><span class="cw">:</span>
<span class="cw">  </span><span class="cy">name</span><span class="cw">: team-alpha</span>
<span class="cw">  </span><span class="cy">labels</span><span class="cw">:</span>
<span class="cw">    </span><span class="cy">planectl/layer</span><span class="cw">: </span><span class="co">infra-control</span>
<span class="cw">    </span><span class="cy">managed-by</span><span class="cw">: </span><span class="co">infra-layer</span>
<span class="cw">  </span><span class="cy">annotations</span><span class="cw">:</span>
<span class="cw">    </span><span class="cy">planectl/owner</span><span class="cw">: </span><span class="co">crossplane</span>
      </div>
      <p class="body-text">
        The label <code style="color:#f97316;font-size:11px;">planectl/layer: infra-control</code> marks
        this object as belonging to the infra layer.
        Pulumi will <strong>read</strong> this namespace — it will never create or delete it.
      </p>
      <div class="section-label">Observe the infra layer output</div>
      ${cmd('kubectl get namespaces -l managed-by=pulumi',               'Namespaces owned by the infra layer')}
      ${cmd('kubectl get namespace team-alpha -o yaml | grep -A8 annotations', 'Read the layer annotations on the namespace')}
      ${cmd('kubectl get application crossplane-buckets -n argocd',                   'ArgoCD Application syncing infra/teams/')}
    `
  },
  {
    label: 'Functional Layer',
    desc: 'Pulumi runs quota rules on top',
    title: 'The functional layer tunes the skeleton.',
    subtitle: '// Namespace.get() — reference, never create. retain_on_delete — never destroy.',
    body: () => `
      <p class="body-text">
        The functional layer's job is to answer: <em>given this namespace exists, what should it do right now?</em>
        It reads the namespace, computes desired quota values (the rule), and applies a ResourceQuota.
      </p>
      <p class="body-text">
        The boundary between layers is enforced in two lines of code — not convention, not documentation:
      </p>
      <div class="code-block pulumi" style="margin:12px 0;">
<span class="cm"># Pulumi never creates what the infra layer owns.</span>
<span class="cm"># .get() is a reference, not a creation.</span>
<span class="cp">existing_ns</span><span class="cw"> = k8s.core.v1.Namespace.</span><span class="cg">get</span><span class="cw">(f"{team}-ns-ref", id=namespace)</span>

<span class="cm"># Pulumi never destroys what the infra layer owns.</span>
<span class="cm"># If this stack is deleted, the quota disappears but the namespace stays.</span>
<span class="cp">opts</span><span class="cw">=pulumi.ResourceOptions(</span>
<span class="cw">    retain_on_delete=</span><span class="cg">True</span><span class="cw">,</span>  <span class="cm"># ← the boundary in one line</span>
<span class="cw">)</span>
      </div>
      <div class="section-label">Run the functional layer — open Gitea Actions</div>
      <a class="open-btn gitea-btn" href="#" data-config="gitea-actions" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Open "Pulumi Quota Tuner"
      </a>
      <p class="body-text" style="margin-top:12px;">
        Fill in: team=<code style="color:var(--accent3)">alpha</code>,
        max_cpu=<code style="color:var(--accent3)">4</code>,
        max_memory=<code style="color:var(--accent3)">8Gi</code>,
        operation=<code style="color:var(--accent3)">up</code>.
        Then come back here and run the commands below.
      </p>
      <div class="section-label">Verify after the workflow completes</div>
      ${cmd('kubectl get resourcequota -A',                                        'All quotas — default-quota should appear')}
      ${cmd('kubectl get resourcequota default-quota -n team-alpha -o yaml | grep -A6 annotations', 'Layer annotations on the quota')}
    `
  },
  {
    label: 'Prove the Boundary',
    desc: 'Two objects. Two layers. Zero ambiguity.',
    title: 'The boundary is visible in the cluster.',
    subtitle: '// kubectl is your audit log — no Slack thread needed',
    body: () => `
      <p class="body-text">
        Both objects — namespace and quota — are in the same cluster, same team.
        But they belong to different layers. The annotations make ownership machine-readable.
      </p>
      <div class="boundary-grid">
        <div class="boundary-card infra">
          <div class="bc-label infra">Infra Layer owns</div>
          <div class="bc-title">Namespace team-alpha</div>
          <div class="bc-body">
            <code style="color:#f97316;">planectl/layer: infra-control</code><br>
            <code style="color:#f97316;">planectl/owner: crossplane</code><br><br>
            Created by ArgoCD syncing <code>infra/teams/</code>.<br>
            Pulumi has <strong style="color:var(--text)">never touched</strong> this object.
          </div>
        </div>
        <div class="boundary-card pulumi">
          <div class="bc-label pulumi">Functional Layer owns</div>
          <div class="bc-title">ResourceQuota default-quota</div>
          <div class="bc-body">
            <code style="color:var(--accent3);">planectl/layer: functional-control</code><br>
            <code style="color:var(--accent3);">planectl/managed-by: pulumi</code><br>
            <code style="color:var(--accent3);">planectl/reason: quota tuned for team alpha</code><br><br>
            Created by Pulumi. Values computed by the rule.
          </div>
        </div>
      </div>
      <div class="section-label">Read the ownership from the cluster directly</div>
      ${cmd('kubectl get namespace team-alpha -o jsonpath=\'{.metadata.labels}\' | python3 -m json.tool', 'Layer label on the namespace')}
      ${cmd('kubectl get resourcequota default-quota -n team-alpha -o yaml | grep -A5 annotations',         'Layer annotations on the quota')}
      ${cmd('kubectl get resourcequota -A -l planectl/managed-by=pulumi',                             'All objects Pulumi owns across all namespaces')}
    `
  },
  {
    label: 'Drift Recovery',
    desc: 'Delete quota → Pulumi heals it',
    title: 'Pulumi detects and heals drift.',
    subtitle: '// delete the quota manually. run up again. it comes back.',
    body: () => `
      <p class="body-text">
        Someone manually deletes the quota from the cluster — a panic fix at 2am.
        The infra layer does not notice: it owns the namespace, not the quota.
        The functional layer does notice, on the next run.
      </p>
      <div class="t-block">
        <div style="color:var(--muted);font-size:10px;margin-bottom:8px;"># Step 1: simulate drift</div>
        <div><span class="t-prompt">$</span> <span class="t-cmd">kubectl delete resourcequota default-quota -n team-alpha</span></div>
        <div style="color:var(--muted);margin-top:4px;">resourcequota "default-quota" deleted</div>
        <div style="margin-top:10px;color:var(--muted);font-size:10px;"># Step 2: Pulumi sees desired ≠ observed</div>
        <div><span class="t-prompt">$</span> <span class="t-cmd">kubectl get resourcequota -n team-alpha</span></div>
        <div style="color:var(--red);">No resources found in team-alpha namespace.</div>
        <div style="margin-top:10px;color:var(--muted);font-size:10px;"># Step 3: run workflow again (operation=up)</div>
        <div><span class="t-prompt">$</span> <span class="t-cmd">kubectl get resourcequota -n team-alpha</span></div>
        <div style="color:var(--green);">NAME          AGE   REQUEST   LIMIT</div>
        <div style="color:var(--green);">default-quota   5s    ...</div>
      </div>
      <p class="body-text" style="margin-top:12px;">
        Pulumi state knew the quota should have <code style="color:var(--accent3)">cpu=4</code>.
        It detected the drift and recreated the quota with the exact same values.
        <strong>No human decision needed. The rule is the memory.</strong>
      </p>
      <div class="section-label">Try it now</div>
      ${cmd('kubectl delete resourcequota default-quota -n team-alpha',   'Simulate drift — delete the quota')}
      ${cmd('kubectl get resourcequota -n team-alpha',                  'Confirm it is gone')}
    `
  },
  {
    label: 'The Hard Boundary',
    desc: 'Destroy Pulumi → namespace survives',
    title: 'retain_on_delete holds the boundary.',
    subtitle: '// destroy the functional stack. the infra layer is untouched.',
    body: () => `
      <p class="body-text">
        Run <code style="color:var(--accent3)">pulumi destroy</code> via the workflow (operation=destroy).
        The quota disappears — the functional layer no longer manages it.
        The namespace <strong>stays</strong>.
        <code style="color:var(--accent3)">retain_on_delete=True</code> enforces the boundary in both directions.
      </p>
      <div class="t-block">
        <div style="color:var(--muted);font-size:10px;margin-bottom:8px;"># After running operation=destroy</div>
        <div><span class="t-prompt">$</span> <span class="t-cmd">kubectl get namespace team-alpha</span></div>
        <div style="color:var(--green);">NAME         STATUS   AGE</div>
        <div style="color:var(--green);">team-alpha   Active   42m   <span style="color:var(--muted);">← still here</span></div>
        <div style="margin-top:8px;"><span class="t-prompt">$</span> <span class="t-cmd">kubectl get resourcequota -n team-alpha</span></div>
        <div style="color:var(--red);">No resources found.   <span style="color:var(--muted);">← quota is gone</span></div>
      </div>
      <p class="body-text" style="margin-top:12px;">
        The infra layer owns the namespace. Pulumi cannot delete it — not even accidentally.
        The boundary is not a comment in a runbook. It is <em>a flag on every resource Pulumi creates</em>.
      </p>
      <div class="section-label">Verify after workflow operation=destroy</div>
      ${cmd('kubectl get namespace team-alpha',          'Namespace owned by infra layer — survives destroy')}
      ${cmd('kubectl get resourcequota -n team-alpha',   'Quota owned by Pulumi — gone after destroy')}
      ${cmd('kubectl get namespaces -l managed-by=pulumi', 'All infra-layer objects still intact')}
    `
  },
  {
    label: 'The Rule Is Code',
    desc: 'Git stores the logic, not the number',
    title: 'The rule lives in Git. The answer does not.',
    subtitle: '// change max_cpu in the form. the rule recomputes. the cluster updates.',
    body: () => `
      <p class="body-text">
        In the workflow form you set <code style="color:var(--accent3)">max_cpu=4</code>.
        That is not a config value — it is a <em>parameter to the rule</em>.
        The rule in <code style="color:var(--accent3)">__main__.py</code> decides what to do with it.
      </p>
      <div class="boundary-grid">
        <div class="boundary-card infra" style="border-color:rgba(255,59,92,0.3);">
          <div class="bc-label" style="color:var(--red);">Static config (old way)</div>
          <div class="bc-title">Number lives in Git</div>
          <div class="bc-body">
            <code style="color:var(--muted);">requests.cpu: "2"</code><br>
            A human guessed this at deploy time.<br>
            It rots. Nobody revisits it.<br>
            <strong style="color:var(--text)">200 teams × 40% overprovisioned = waste.</strong>
          </div>
        </div>
        <div class="boundary-card pulumi">
          <div class="bc-label pulumi">Dynamic rule (planectl)</div>
          <div class="bc-title">Logic lives in Git</div>
          <div class="bc-body">
            <code style="color:var(--accent3);">desired_cpu = max_cpu</code><br>
            Replace with: <code style="color:var(--accent3);">usage.p95 * headroom</code><br>
            The rule runs. The cluster self-tunes.<br>
            <strong style="color:var(--text)">No stale numbers. No manual revisit.</strong>
          </div>
        </div>
      </div>
      <p class="body-text">
        The <code style="color:var(--accent3)">planectl/reason</code> annotation on every quota tells you
        exactly why that value exists — which rule, which parameters, which team.
        <code style="color:var(--accent3)">kubectl get resourcequota -o yaml</code> is the audit log.
      </p>
      <div class="bottom-line">
        Crossplane owns the skeleton. Pulumi owns the behavior.<br>
        ArgoCD owns the intent. Gitea owns the truth.
      </div>
      <div class="section-label">Full system state</div>
      ${cmd('kubectl get application crossplane-buckets -n argocd',              'Layer 2: ArgoCD sync status')}
      ${cmd('kubectl get pods -n crossplane-system',                      'Layer 3: Crossplane running')}
      ${cmd('kubectl get resourcequota -A -l planectl/managed-by=pulumi', 'Layer 4: all Pulumi-managed quotas')}
      ${cmd('kubectl get namespaces -l managed-by=pulumi',           'Layer 3: all infra-owned namespaces')}
    `
  }
];

// ── cmd helper ────────────────────────────────────────────────────────────────
function cmd(command, hint) {
  const b64 = btoa(command + '\r');
  return `<div class="cmd-block" onclick="sendB64('${b64}'); document.getElementById('terminal-section').scrollIntoView({behavior:'smooth'})">
    <span class="cmd-arrow">▶</span>
    <span class="cmd-text">${command}</span>
    <span class="cmd-hint">${hint}</span>
  </div>`;
}

function sendB64(b64) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'b64', data: b64 }));
}

// ── state ─────────────────────────────────────────────────────────────────────
let current = 0;

function renderSidebar() {
  const list = document.getElementById('step-list');
  list.innerHTML = steps.map((s, i) => `
    <div class="step-item ${i === current ? 'active' : ''} ${i < current ? 'completed' : ''}" onclick="goTo(${i})">
      <div class="step-num">${i < current ? '✓' : i + 1}</div>
      <div class="step-info">
        <div class="step-label">${s.label}</div>
        <div class="step-desc">${s.desc}</div>
      </div>
    </div>
  `).join('');
}

function renderContent() {
  const s = steps[current];
  document.getElementById('step-tag').textContent = `Step ${current + 1} of ${steps.length}`;
  document.getElementById('content-title').textContent = s.title;
  document.getElementById('content-subtitle').textContent = s.subtitle;
  document.getElementById('content-body').innerHTML = s.body();
  document.getElementById('nav-counter').textContent = `${current + 1} / ${steps.length}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === steps.length - 1;
  document.getElementById('progress-fill').style.width = `${((current + 1) / steps.length) * 100}%`;
  if (current === 0) setTimeout(resetPipeline, 100);
  patchConfigLinks();
}

function patchConfigLinks() {
  if (!window._cfg) return;
  const { giteaUrl, argoUrl, demoRepo } = window._cfg;
  const map = {
    'gitea-actions': `${giteaUrl}/${demoRepo}/actions?workflow=bucket-deploy.yaml&actor=0&status=0`,
    'argo-apps': `${argoUrl}/applications`,
  };
  document.querySelectorAll('[data-config]').forEach(el => { const k = el.getAttribute('data-config'); if (map[k]) el.href = map[k]; });
}

function goTo(n) { current = n; renderSidebar(); renderContent(); document.getElementById('content-body').scrollTop = 0; }
function nextStep() { if (current < steps.length - 1) goTo(current + 1); }
function prevStep() { if (current > 0) goTo(current - 1); }

// ── pipeline animation ────────────────────────────────────────────────────────
let pipelineRunning = false;

function resetPipeline() {
  ['pn-git','pn-argo','pn-xp','pn-pulumi'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('visible'); });
  ['pa-1','pa-2','pa-3'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('visible','active-arrow'); });
  ['badge-git','badge-argo','badge-xp','badge-pulumi'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('show'); });
  const msg = document.getElementById('pipeline-message'); if (msg) msg.textContent = '';
  pipelineRunning = false;
}

async function runPipelineAnimation() {
  if (pipelineRunning) return;
  pipelineRunning = true; resetPipeline(); pipelineRunning = true; await sleep(200);
  const msg = document.getElementById('pipeline-message');
  const anim = [
    { node:'pn-git',    badge:'badge-git',    arrow:null,  message:'Commit pushed to Gitea — source of truth updated' },
    { node:null,        badge:null,           arrow:'pa-1', message:'ArgoCD detects diff between Git and cluster...' },
    { node:'pn-argo',   badge:'badge-argo',   arrow:null,  message:'ArgoCD: kubectl apply infra/teams/ — namespaces exist' },
    { node:null,        badge:null,           arrow:'pa-2', message:'Crossplane reconciles infra objects...' },
    { node:'pn-xp',     badge:'badge-xp',     arrow:null,  message:'Crossplane: skeleton is READY — namespace exists, right shape' },
    { node:null,        badge:null,           arrow:'pa-3', message:'Pulumi reads namespace, computes quota rule...' },
    { node:'pn-pulumi', badge:'badge-pulumi', arrow:null,  message:'✓ Pulumi: quota applied. planectl/layer=functional-control' },
  ];
  for (const step of anim) {
    if (step.node)  { const el = document.getElementById(step.node);  if (el) el.classList.add('visible'); }
    if (step.arrow) { const el = document.getElementById(step.arrow); if (el) el.classList.add('visible','active-arrow'); }
    if (step.message && msg) msg.textContent = step.message;
    await sleep(900);
    if (step.badge) { const el = document.getElementById(step.badge); if (el) el.classList.add('show'); await sleep(300); }
  }
  pipelineRunning = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── terminal ──────────────────────────────────────────────────────────────────
const term = new Terminal({
  theme: {
    background:'#0d1117', foreground:'#e6edf3', cursor:'#00d4ff', cursorAccent:'#0d1117',
    selectionBackground:'#1e3a5f',
    black:'#484f58', red:'#ff7b72', green:'#3fb950', yellow:'#d29922',
    blue:'#58a6ff', magenta:'#bc8cff', cyan:'#39c5cf', white:'#b1bac4',
    brightBlack:'#6e7681', brightRed:'#ffa198', brightGreen:'#56d364',
    brightYellow:'#e3b341', brightBlue:'#79c0ff', brightMagenta:'#d2a8ff',
    brightCyan:'#56d4dd', brightWhite:'#f0f6fc',
  },
  fontFamily:'"Cascadia Code","Fira Code","JetBrains Mono",Menlo,monospace',
  fontSize:13, lineHeight:1.4, cursorBlink:true, cursorStyle:'block', scrollback:5000, allowProposedApi:true,
});

const fitAddon = new FitAddon.FitAddon();
const webLinks = new WebLinksAddon.WebLinksAddon();
term.loadAddon(fitAddon); term.loadAddon(webLinks);
term.open(document.getElementById('terminal-container'));
fitAddon.fit();

let ws, attachAddon;

function connect() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onopen = () => { attachAddon = new AttachAddon.AttachAddon(ws); term.loadAddon(attachAddon); sendResize(); updateStatus('connected'); };
  ws.onclose = () => { updateStatus('disconnected'); setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
}

function sendResize() { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'resize', cols:term.cols, rows:term.rows })); }

function updateStatus(state) {
  const dot = document.getElementById('status-dot'), label = document.getElementById('status-label');
  if (state === 'connected') { dot.style.background = '#3fb950'; label.textContent = 'connected'; }
  else { dot.style.background = '#ff7b72'; label.textContent = 'reconnecting…'; }
}

window.addEventListener('resize', () => { fitAddon.fit(); sendResize(); });
term.onResize(sendResize);

document.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('terminal-container')) return;
  if (e.key === 'ArrowRight') nextStep();
  if (e.key === 'ArrowLeft')  prevStep();
});

// ── init ──────────────────────────────────────────────────────────────────────
renderSidebar(); renderContent();

fetch('/config')
  .then(r => r.json())
  .then(cfg => { window._cfg = cfg; patchConfigLinks(); })
  .catch(() => { window._cfg = { giteaUrl:'http://localhost:30080', argoUrl:'http://localhost:8080', demoRepo:'admin/demo-repo' }; });

connect();
</script>
</body>
</html>
