apiVersion: v2
name: planectl
description: |
  One-command management cluster: Gitea + ArgoCD + Crossplane + Pulumi Operator,
  all wired together via readable YAML in wiring/. A single helm install bootstraps
  the full pipeline -- git server, CD engine, cloud controller, and k8s operator.
type: application
version: 0.5.0
appVersion: "0.5.0"
keywords:
  - gitops
  - gitea
  - argocd
  - crossplane
  - pulumi
  - kubernetes
  - infrastructure-as-code
home: https://github.com/drulacosmin/planectl
sources:
  - https://github.com/drulacosmin/planectl
maintainers:
  - name: drulacosmin
    url: https://github.com/drulacosmin
dependencies:
  - name: gitea
    version: "12.5.0"
    repository: https://dl.gitea.com/charts/
    condition: gitea.enabled
  - name: argo-cd
    version: "7.8.28"
    repository: https://argoproj.github.io/argo-helm
    condition: argo-cd.enabled
  - name: crossplane
    version: "1.18.5"
    repository: https://charts.crossplane.io/stable
    condition: crossplane.enabled
  - name: pulumi-kubernetes-operator
    version: "2.5.1"
    repository: oci://ghcr.io/pulumi/helm-charts
    condition: pulumi-kubernetes-operator.enabled
