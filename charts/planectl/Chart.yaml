apiVersion: v2
name: planectl
description: |
  One helm install. Four vanilla upstream CNCF charts (Gitea, ArgoCD,
  Crossplane, Pulumi Operator) pre-wired and ready to use as a GitOps
  management platform. All connections live in readable wiring/ YAML files.
  Optional: KEDA for event-driven autoscaling.
type: application
version: 0.6.0
appVersion: "0.6.0"
keywords:
  - gitops
  - gitea
  - argocd
  - crossplane
  - pulumi
  - kubernetes
  - infrastructure-as-code
home: https://github.com/drulacosmin/planectl
sources:
  - https://github.com/drulacosmin/planectl
maintainers:
  - name: drulacosmin
    url: https://github.com/drulacosmin
dependencies:
  - name: gitea
    version: "12.5.0"
    repository: https://dl.gitea.com/charts/
    condition: gitea.enabled
  - name: argo-cd
    version: "7.8.28"
    repository: https://argoproj.github.io/argo-helm
    condition: argo-cd.enabled
  - name: crossplane
    version: "1.18.5"
    repository: https://charts.crossplane.io/stable
    condition: crossplane.enabled
  - name: pulumi-kubernetes-operator
    version: "2.5.1"
    repository: oci://ghcr.io/pulumi/helm-charts
    condition: pulumi-kubernetes-operator.enabled
  - name: keda
    version: "2.16.0"
    repository: https://kedacore.github.io/charts
    condition: keda.enabled
